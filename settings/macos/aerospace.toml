# This configuration supports both internal and external keyboards with
# different key mappings applied via `macOS` keyboard settings:
#
# INTERNAL KEYBOARD MAPPINGS:
# - Option ↔ Control (physical Option becomes Control, physical Control becomes Option)
# - Globe key/FN → Left Command
# - Section Sign (£/§) → Tilde (~)
#
# EXTERNAL KEYBOARD MAPPINGS (Contrlol becomes Command, Super becomes Option and Alt becomes Control):
# - Control → Command
# - Super → Option
# - Alt → Control
#
# UNIFIED BINDINGS EXPLANATION:
# With these keyboard mappings, the same logical keys are sent to AeroSpace regardless of which keyboard is used:
# - On internal keyboard: Physical Option is mapped to Control, Physical Control is mapped to Option
# - On external keyboard: Physical ALT is mapped to Control, Physical WIN is mapped to Option
# This allows us to use a single set of keybindings (using the alt- prefix) for both keyboards.

# Start `Aerospace` at login.
start-at-login = true

# Enable normalization.
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Disable accordion padding.
accordion-padding = 0

# Set tiles layout as default.
default-root-container-layout = 'tiles'

# Set orientation according to monitor aspect ratio.
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes.
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Automatically re-appear hidden apps on `macOS`.
automatically-unhide-macos-hidden-apps = false

# Floating windows.
[[on-window-detected]]
if.app-name-regex-substring = 'finder'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'wezterm'
run = 'layout floating'

# Set key mapping preset.
[key-mapping]
preset = 'qwerty'

# Gaps between each window.
[gaps]
inner.horizontal = 5
inner.vertical = 5
outer.left = 5
outer.bottom = 5
outer.top = 40
outer.right = 5

# 'main' binding mode declaration.
[mode.main.binding]

# Layout floating/tiling toggle.
# Internal: Physical Option + Shift + T.
# External: Physical Alt + Shift + T.
# Both send the same logical keys (alt-shift-t) to AeroSpace.
alt-shift-t = 'layout floating tiling'

# Toggle fullscreen.
# Internal: Physical Option + Shift + F.
# External: Physical Alt + Shift + F.
# Both send the same logical keys (alt-shift-f) to AeroSpace.
alt-shift-f = 'fullscreen'

# Join windows together.
# Internal: Physical Option + Shift + Arrow.
# External: Physical Alt + Shift + Arrow.
# Both send the same logical keys (alt-shift-arrow) to AeroSpace.
alt-shift-up = 'join-with up'
alt-shift-down = 'join-with down'
alt-shift-left = 'join-with left'
alt-shift-right = 'join-with right'

# Rotate the windows cyclically.
# Internal: Physical Option + R.
# External: Physical Alt + R.
# Both send the same logical keys (alt-r) to AeroSpace.
alt-r = 'layout tiles horizontal vertical'

# Focus navigation.
# Internal: Physical Option + H/J/K/L.
# External: Physical Alt + H/J/K/L.
# Both send the same logical keys (alt-hjkl) to AeroSpace.
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move windows.
# Internal: Physical Option + Shift + H/J/K/L.
# External: Physical Alt + Shift + H/J/K/L.
# Both send the same logical keys (alt-shift-hjkl) to AeroSpace.
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize the focused window.
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# Workspace management.
# Internal: Physical Option + Number.
# External: Physical Alt + Number.
# Both send the same logical keys (alt-number) to AeroSpace.
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'

# Move window to specific workspace.
# Internal: Physical Option + Shift + Number.
# External: Physical Alt + Shift + Number.
# Both send the same logical keys (alt-shift-number) to AeroSpace.
alt-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
alt-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
alt-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
alt-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'
alt-shift-5 = 'move-node-to-workspace 5 --focus-follows-window'
alt-shift-6 = 'move-node-to-workspace 6 --focus-follows-window'
alt-shift-7 = 'move-node-to-workspace 7 --focus-follows-window'
alt-shift-8 = 'move-node-to-workspace 8 --focus-follows-window'
alt-shift-9 = 'move-node-to-workspace 9 --focus-follows-window'
alt-shift-0 = 'move-node-to-workspace 10 --focus-follows-window'

# TODO: Cycle through active windows/applications.
# Cycle through active windows/applications (dual bindings for both keyboards).
# Internal: Physical Control + Tab.
# External: Physical Super + Tab.
# alt-tab = '?'
# ctrl-tab = '?'

# Change workspace and focus it.
# Internal: Physical Option + Right/Left.
# External: Physical Alt + Right/Left.
# Both send the same logical keys (alt-arrow) to AeroSpace.
alt-right = 'workspace next'
alt-left = 'workspace prev'

# Move workspace to next monitor and focus it.
# Internal: Physical Option + Shift + Tab.
# External: Physical Alt + Shift + Tab.
# Both send the same logical keys (alt-shift-tab) to AeroSpace.
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Change keyboard language.
# Internal: Physical Option + Space.
# External: Physical Alt + Space.
# Both send the same logical keys (alt-space) to AeroSpace.
alt-space = 'exec-and-forget osascript ~/.config/scripts/utilities/macos/switch_input_source.scpt'

# Reload environment.
# Internal: Physical Option + Backslash.
# External: Physical Alt + Backslash.
# Both send the same logical keys (alt-backslash) to AeroSpace.
alt-backslash = 'exec-and-forget ~/.config/scripts/utilities/macos/reload_environment.sh'

# Enter service mode.
# Internal: Physical Option + ;.
# External: Physical Alt + ;.
# Both send the same logical keys (alt-semicolon) to AeroSpace.
alt-semicolon = 'mode service'

# Application shortcuts.
# For Spotlight:
# - Internal keyboard: Physical Control + A (sends ctrl-a)
# - External keyboard: Physical Win + A (sends alt-a)
# For other applications:
# - Internal: Physical Option + Letter (sends alt-letter)
# - External: Physical Alt + Letter (sends alt-letter)
alt-a = 'exec-and-forget /Users/xrhstosmour/Developer/dotfiles/.config/scripts/utilities/macos/open_spotlight.sh'
alt-b = 'exec-and-forget open -a "/Applications/Google Chrome.app"'
alt-e = 'exec-and-forget open -a "/Applications/Visual Studio Code.app"'
alt-f = 'exec-and-forget open -a Finder'
alt-m = 'exec-and-forget open -a /Applications/Spotify.app'
alt-n = 'exec-and-forget open -a /Applications/Obsidian.app'
alt-s = 'exec-and-forget open -a "/System/Applications/System Settings.app"'
alt-t = 'exec-and-forget open -a "/Applications/Sublime Text.app"'
alt-enter = 'exec-and-forget osascript ~/.config/scripts/utilities/macos/open_wezterm.scpt'

# 'service' binding mode declaration.
[mode.service.binding]

# After entering service mode, press L to reload the configuration.
l = ['reload-config', 'mode main']

# After entering service mode, press R to reload the configuration and return to the main mode.
r = ['flatten-workspace-tree', 'mode main']

# After entering service mode, press W to configure workspaces based on current displays setup.
w = [
    'exec-and-forget ~/.config/scripts/utilities/macos/configure_workspaces.sh',
    'mode main',
]

# After entering service mode, press Backspace to close all windows except the current one.
backspace = ['close-all-windows-but-current', 'mode main']
